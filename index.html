<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashing Montage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .montage-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .flash-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('assets/unnamed-1.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            animation: flash 0.1s infinite;
        }

        .flash-image:nth-child(2) {
            animation-delay: 0.05s;
        }

        .flash-image:nth-child(3) {
            animation-delay: 0.025s;
        }

        .flash-image:nth-child(4) {
            animation-delay: 0.075s;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .intense-flash {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: intenseFlash 0.05s infinite;
        }

        @keyframes intenseFlash {
            0%, 25%, 50%, 75%, 100% { opacity: 1; }
            12.5%, 37.5%, 62.5%, 87.5% { opacity: 0; }
        }

        .strobe {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: strobe 0.02s infinite;
        }

        @keyframes strobe {
            0%, 50% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: #0ff;
            font-family: 'Courier New', monospace;
            border: 1px solid #0ff;
        }

        .image-selector {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 0, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            border: 1px solid #f0f;
        }

        .image-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #f0f;
            border-radius: 5px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: all 0.3s;
        }

        .image-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        .image-btn.active {
            border-color: #0f0;
            box-shadow: 0 0 10px #0f0;
        }

        .controls button {
            margin: 5px;
            padding: 10px 20px;
            background: #00f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: #008;
            transform: scale(1.05);
        }

        .controls button.active {
            background: #0f0;
        }

        .monkey-svg {
            position: absolute;
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="montage-container">
        <!-- Your uploaded image will flash here -->

        <!-- Multiple flashing layers -->
        <div class="flash-image"></div>
        <div class="flash-image"></div>
        <div class="flash-image"></div>
        <div class="flash-image"></div>
    </div>

    <div class="controls">
        <h3 style="color: white; margin-top: 0;">Flash Controls</h3>
        <button onclick="setMode('normal')" class="active" id="normalBtn">Normal Flash</button>
        <button onclick="setMode('intense')" id="intenseBtn">Intense Flash</button>
        <button onclick="setMode('strobe')" id="strobeBtn">Strobe Mode</button>
        <button onclick="setMode('chaos')" id="chaosBtn">Chaos Mode</button>
        <button onclick="setMode('glitch')" id="glitchBtn">Glitch Mode</button>
        <button onclick="toggleAnimation()" id="pauseBtn">Pause</button>
        <button onclick="toggleAutoMode()" id="autoBtn">Auto Mode: OFF</button>
    </div>

    <div class="stats">
        <h4 style="margin-top: 0; color: #0ff;">STATISTICS</h4>
        <div>Users: <span id="userCount">0</span></div>
        <div>Views: <span id="viewCount">0</span></div>
        <div>Current: <span id="currentImage">Image 1</span></div>
        <div>Mode: <span id="currentMode">Normal</span></div>
    </div>

    <div class="image-selector" id="imageSelector">
        <!-- Image buttons will be generated by JavaScript -->
    </div>

    <script>
        let currentMode = 'normal';
        let isPaused = false;
        let autoMode = false;
        let autoInterval = null;
        let currentImageIndex = 0;
        let userData = {
            user_count: 0,
            total_views: 0,
            images: ['assets/unnamed-1.jpg'],
            current_image_index: 0
        };

        // Load user data from JSON
        async function loadUserData() {
            try {
                const response = await fetch('data.json');
                userData = await response.json();
                updateStats();
                createImageButtons();
            } catch (error) {
                console.log('Using default data');
            }
        }

        // Save user data to JSON (simulate with localStorage for demo)
        function saveUserData() {
            localStorage.setItem('montageData', JSON.stringify(userData));
            updateStats();
        }

        // Update statistics display
        function updateStats() {
            document.getElementById('userCount').textContent = userData.user_count;
            document.getElementById('viewCount').textContent = userData.total_views;
            document.getElementById('currentImage').textContent = `Image ${currentImageIndex + 1}`;
            document.getElementById('currentMode').textContent = currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
        }

        // Increment user count (once per session)
        function incrementUserCount() {
            if (!sessionStorage.getItem('counted')) {
                userData.user_count++;
                sessionStorage.setItem('counted', 'true');
                saveUserData();
            }
        }

        // Increment view count
        function incrementViewCount() {
            userData.total_views++;
            saveUserData();
        }

        // Create image selector buttons
        function createImageButtons() {
            const selector = document.getElementById('imageSelector');
            selector.innerHTML = '';
            
            // Add default images if none exist
            if (userData.images.length === 1) {
                userData.images = [
                    'assets/unnamed-1.jpg',
                    'assets/unnamed-2.jpg',
                    'assets/unnamed-3.jpg',
                    'assets/unnamed-4.jpg'
                ];
            }
            
            userData.images.forEach((imagePath, index) => {
                const btn = document.createElement('div');
                btn.className = 'image-btn';
                if (index === currentImageIndex) btn.classList.add('active');
                btn.style.backgroundImage = `url(${imagePath})`;
                btn.onclick = () => selectImage(index);
                selector.appendChild(btn);
            });
        }

        // Select image
        function selectImage(index) {
            currentImageIndex = index;
            userData.current_image_index = index;
            
            // Update all flash layers with new image
            const flashes = document.querySelectorAll('.flash-image');
            flashes.forEach(flash => {
                flash.style.backgroundImage = `url(${userData.images[index]})`;
            });
            
            // Update active button
            document.querySelectorAll('.image-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            updateStats();
            saveUserData();
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Remove all animation classes
            const flashes = document.querySelectorAll('.flash-image');
            flashes.forEach(flash => {
                flash.className = 'flash-image';
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Apply new mode
            switch(mode) {
                case 'intense':
                    flashes.forEach((flash, index) => {
                        flash.classList.add('intense-flash');
                        flash.style.animationDelay = `${index * 0.01}s`;
                    });
                    document.getElementById('intenseBtn').classList.add('active');
                    break;
                    
                case 'strobe':
                    flashes.forEach((flash, index) => {
                        flash.classList.add('strobe');
                        flash.style.animationDelay = `${index * 0.005}s`;
                    });
                    document.getElementById('strobeBtn').classList.add('active');
                    break;
                    
                case 'chaos':
                    flashes.forEach((flash, index) => {
                        flash.style.animationDuration = `${0.02 + Math.random() * 0.08}s`;
                        flash.style.animationDelay = `${Math.random() * 0.1}s`;
                    });
                    document.getElementById('chaosBtn').classList.add('active');
                    break;
                    
                case 'glitch':
                    flashes.forEach((flash, index) => {
                        flash.style.animation = `glitch ${0.1 + Math.random() * 0.2}s infinite`;
                        flash.style.animationDelay = `${Math.random() * 0.05}s`;
                        flash.style.filter = `hue-rotate(${Math.random() * 360}deg) saturate(${1 + Math.random() * 2})`;
                    });
                    document.getElementById('glitchBtn').classList.add('active');
                    break;
                    
                default:
                    document.getElementById('normalBtn').classList.add('active');
            }
        }

        function toggleAnimation() {
            isPaused = !isPaused;
            const flashes = document.querySelectorAll('.flash-image');
            const pauseBtn = document.getElementById('pauseBtn');
            
            if (isPaused) {
                flashes.forEach(flash => {
                    flash.style.animationPlayState = 'paused';
                });
                pauseBtn.textContent = 'Resume';
                pauseBtn.style.background = '#f00';
            } else {
                flashes.forEach(flash => {
                    flash.style.animationPlayState = 'running';
                });
                pauseBtn.textContent = 'Pause';
                pauseBtn.style.background = '#00f';
            }
        }

        // Add keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': setMode('normal'); break;
                case '2': setMode('intense'); break;
                case '3': setMode('strobe'); break;
                case '4': setMode('chaos'); break;
                case ' ': toggleAnimation(); e.preventDefault(); break;
            }
        });

        // Toggle auto mode
        function toggleAutoMode() {
            autoMode = !autoMode;
            const autoBtn = document.getElementById('autoBtn');
            
            if (autoMode) {
                autoBtn.textContent = 'Auto Mode: ON';
                autoBtn.style.background = '#0f0';
                autoInterval = setInterval(() => {
                    if (!isPaused) {
                        // Random mode switch
                        const modes = ['normal', 'intense', 'strobe', 'chaos', 'glitch'];
                        const randomMode = modes[Math.floor(Math.random() * modes.length)];
                        setMode(randomMode);
                        
                        // Random image switch occasionally
                        if (Math.random() < 0.1) {
                            const randomImage = Math.floor(Math.random() * userData.images.length);
                            selectImage(randomImage);
                        }
                    }
                }, 1500);
            } else {
                autoBtn.textContent = 'Auto Mode: OFF';
                autoBtn.style.background = '#00f';
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
            }
        }

        // Add glitch animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes glitch {
                0%, 100% { 
                    transform: translate(0, 0);
                    opacity: 1;
                }
                20% { 
                    transform: translate(-2px, 2px);
                    opacity: 0.8;
                }
                40% { 
                    transform: translate(-2px, -2px);
                    opacity: 1;
                }
                60% { 
                    transform: translate(2px, 2px);
                    opacity: 0.9;
                }
                80% { 
                    transform: translate(2px, -2px);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize on load
        window.addEventListener('load', () => {
            loadUserData();
            incrementUserCount();
            incrementViewCount();
            
            // Update view count every 10 seconds
            setInterval(incrementViewCount, 10000);
        });

        // Add keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': setMode('normal'); break;
                case '2': setMode('intense'); break;
                case '3': setMode('strobe'); break;
                case '4': setMode('chaos'); break;
                case '5': setMode('glitch'); break;
                case ' ': toggleAnimation(); e.preventDefault(); break;
                case 'a': case 'A': toggleAutoMode(); break;
                case 'ArrowLeft': 
                    selectImage((currentImageIndex - 1 + userData.images.length) % userData.images.length);
                    break;
                case 'ArrowRight': 
                    selectImage((currentImageIndex + 1) % userData.images.length);
                    break;
            }
        });
    </script>
</body>
</html>
